services:
  mongodb:
    image: mongo:7.0
    container_name: mail2task-mongodb
    restart: unless-stopped
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_DATABASE: mail2task
    command: mongod --noauth
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "mongodb://admin:admin1234@localhost:27018/admin",
          "--eval",
          "db.adminCommand('ping').ok",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mongodb_data:
